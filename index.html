<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何分前・何分後プリント</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
            .print-page {
                width: 210mm;
                min-height: 297mm;
                padding: 15mm;
                margin: 0;
                box-sizing: border-box;
                border: none !important;
                box-shadow: none !important;
            }
        }
        .print-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin: 20px auto;
            padding: 15mm;
            box-sizing: border-box;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
        }
        .question-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px 20px;
        }
        .clock-svg {
            width: 150px;
            height: 150px;
        }
        .q-text {
            line-height: 1.6;
            font-size: 1.15rem;
        }
        .answer-line {
            border-bottom: 1px solid black;
            display: inline-block;
            min-width: 120px;
            margin-left: 5px;
        }
        /* カスタムラジオボタンのスタイル：選択時を水色に変更 */
        .peer:checked + span {
            background-color: #0ea5e9; /* sky-500 */
            color: white;
            border-color: #0ea5e9;
        }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <!-- 設定パネル -->
    <div class="no-print max-w-[210mm] mx-auto bg-white p-6 rounded-lg shadow-md mb-8">
        <h1 class="text-xl font-bold mb-4 border-b pb-2">プリント設定</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block font-bold mb-2">問題数</label>
                <div class="flex flex-wrap gap-2">
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="qCount" value="4" class="hidden peer">
                        <span class="px-4 py-2 border rounded hover:bg-gray-50 transition-colors">4問</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="qCount" value="6" class="hidden peer">
                        <span class="px-4 py-2 border rounded hover:bg-gray-50 transition-colors">6問</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="qCount" value="8" class="hidden peer" checked>
                        <span class="px-4 py-2 border rounded hover:bg-gray-50 transition-colors">8問</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="qCount" value="10" class="hidden peer">
                        <span class="px-4 py-2 border rounded hover:bg-gray-50 transition-colors">10問</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block font-bold mb-2">分のきざみ</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="step" value="1" checked> <span class="ml-2">1分</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="step" value="5"> <span class="ml-2">5分</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="step" value="10"> <span class="ml-2">10分</span></label>
                </div>
            </div>

            <div>
                <label class="block font-bold mb-2">12をまたぐ問題（時が変わる）</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="cross" value="no" checked> <span class="ml-2">なし</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="cross" value="yes"> <span class="ml-2">あり</span></label>
                </div>
            </div>

            <div>
                <label class="block font-bold mb-2">出題内容</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="direction" value="after"> <span class="ml-2">後だけ</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="direction" value="before"> <span class="ml-2">前だけ</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="direction" value="mixed" checked> <span class="ml-2">前後</span></label>
                </div>
            </div>

            <div>
                <label class="block font-bold mb-2">解答形式</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="format" value="write" checked> <span class="ml-2">記述式</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="format" value="choice"> <span class="ml-2">2択式</span></label>
                </div>
            </div>

            <div>
                <label class="block font-bold mb-2">表示方法</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="display" value="text" checked> <span class="ml-2">数字</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="display" value="clock"> <span class="ml-2">時計画像</span></label>
                </div>
            </div>
        </div>

        <div class="mt-8 flex gap-4">
            <button onclick="generateWorksheet()" class="flex-1 bg-sky-500 text-white font-bold py-3 rounded hover:bg-sky-600 transition">
                問題を作る
            </button>
            <button onclick="window.print()" class="flex-1 bg-blue-700 text-white font-bold py-3 rounded hover:bg-blue-800 transition">
                印刷する
            </button>
        </div>
    </div>

    <!-- プリント本体 -->
    <div id="print-area" class="print-page">
        <div class="flex justify-between items-end mb-10">
            <div class="text-right w-full">
                <div class="text-lg">なまえ：____________________________________</div>
            </div>
        </div>

        <div id="questions-container" class="question-grid">
            <!-- JavaScriptで生成 -->
        </div>
    </div>

    <script>
        function createClockSVG(hour, minute) {
            const hDegree = (hour % 12) * 30 + (minute / 60) * 30;
            const mDegree = minute * 6;
            
            let marks = '';
            // 60分の目盛り
            for (let i = 0; i < 60; i++) {
                const angle = i * 6 * Math.PI / 180;
                const isFive = i % 5 === 0;
                const r1 = isFive ? 40 : 42;
                const r2 = 45;
                const x1 = 50 + r1 * Math.sin(angle);
                const y1 = 50 - r1 * Math.cos(angle);
                const x2 = 50 + r2 * Math.sin(angle);
                const y2 = 50 - r2 * Math.cos(angle);
                marks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="black" stroke-width="${isFive ? 1.5 : 0.5}" />`;
            }

            // 数字1-12：目盛りに当たらないよう半径を36から33.5へ微調整
            let numbers = '';
            for (let i = 1; i <= 12; i++) {
                const angle = i * 30 * Math.PI / 180;
                const x = 50 + 33.5 * Math.sin(angle);
                const y = 50 - 33.5 * Math.cos(angle) + 3;
                numbers += `<text x="${x}" y="${y}" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="500">${i}</text>`;
            }
            
            return `
                <svg viewBox="0 0 100 100" class="clock-svg mx-auto">
                    <!-- 外枠 -->
                    <circle cx="50" cy="50" r="46" fill="none" stroke="black" stroke-width="1" />
                    ${marks}
                    ${numbers}
                    <!-- 時針 -->
                    <line x1="50" y1="50" x2="${50 + 22 * Math.sin(hDegree * Math.PI / 180)}" y2="${50 - 22 * Math.cos(hDegree * Math.PI / 180)}" stroke="black" stroke-width="2.5" stroke-linecap="round" />
                    <!-- 分針 -->
                    <line x1="50" y1="50" x2="${50 + 38 * Math.sin(mDegree * Math.PI / 180)}" y2="${50 - 38 * Math.cos(mDegree * Math.PI / 180)}" stroke="black" stroke-width="1.5" stroke-linecap="round" />
                    <circle cx="50" cy="50" r="2" fill="black" />
                </svg>
            `;
        }

        function generateWorksheet() {
            const container = document.getElementById('questions-container');
            if (!container) return;
            container.innerHTML = '';

            const qCountEl = document.querySelector('input[name="qCount"]:checked');
            const stepEl = document.querySelector('input[name="step"]:checked');
            const crossEl = document.querySelector('input[name="cross"]:checked');
            const directionEl = document.querySelector('input[name="direction"]:checked');
            const formatEl = document.querySelector('input[name="format"]:checked');
            const displayEl = document.querySelector('input[name="display"]:checked');

            if (!qCountEl || !stepEl || !crossEl || !directionEl || !formatEl || !displayEl) {
                return;
            }

            const qCount = parseInt(qCountEl.value);
            const step = parseInt(stepEl.value);
            const crossAllowed = crossEl.value === 'yes';
            const direction = directionEl.value;
            const format = formatEl.value;
            const display = displayEl.value;

            for (let i = 0; i < qCount; i++) {
                let hour, minute, diff, isAfter;
                let valid = false;

                while (!valid) {
                    hour = Math.floor(Math.random() * 12) + 1;
                    minute = Math.floor(Math.random() * (60 / step)) * step;
                    
                    if(step === 1) {
                        diff = Math.floor(Math.random() * 25) + 2; 
                    } else {
                        diff = (Math.floor(Math.random() * 4) + 1) * step;
                    }

                    if (direction === 'mixed') {
                        isAfter = Math.random() > 0.5;
                    } else {
                        isAfter = (direction === 'after');
                    }

                    const totalMinutes = hour * 60 + minute;
                    const newTotalMinutes = isAfter ? totalMinutes + diff : totalMinutes - diff;
                    const startHour = Math.floor(totalMinutes / 60);
                    const endHour = Math.floor(newTotalMinutes / 60);
                    const crosses = (startHour !== endHour);

                    if (!crossAllowed) {
                        if (!crosses && newTotalMinutes >= 60 && newTotalMinutes < 13 * 60) valid = true;
                    } else {
                        if (newTotalMinutes >= 60 && newTotalMinutes < 13 * 60) valid = true;
                    }
                }

                const qDiv = document.createElement('div');
                qDiv.className = 'p-2 flex flex-col items-start relative';
                
                let timeHeader = '';
                if (display === 'text') {
                    timeHeader = `<div class="q-text">${hour}時${minute === 0 ? '' : minute + '分'}の</div>`;
                } else {
                    timeHeader = `<div class="w-full mb-2">${createClockSVG(hour, minute)}</div>`;
                }

                const questionBody = `<div class="q-text">${diff}分${isAfter ? '後' : '前'}は</div>`;

                let answerArea = '';
                if (format === 'write') {
                    answerArea = `<div class="mt-4 text-lg w-full">答え：<span class="answer-line"></span></div>`;
                } else {
                    const correctTotal = isAfter ? (hour * 60 + minute + diff) : (hour * 60 + minute - diff);
                    let cH = Math.floor(correctTotal / 60);
                    if(cH > 12) cH -= 12;
                    if(cH === 0) cH = 12;
                    const cM = correctTotal % 60;

                    let wM = (cM + (Math.random() > 0.5 ? 10 : -10) + 60) % 60;
                    if (wM === cM) wM = (cM + 5) % 60;
                    
                    const choices = [
                        `${cH}時${cM === 0 ? '' : cM + '分'}`,
                        `${cH}時${wM === 0 ? '' : wM + '分'}`
                    ].sort(() => Math.random() - 0.5);

                    answerArea = `
                        <div class="mt-4 flex gap-6 text-md w-full justify-start font-medium">
                            <span>A：${choices[0]}</span>
                            <span>B：${choices[1]}</span>
                        </div>
                        <div class="mt-2 text-lg">答え：<span class="answer-line" style="min-width:60px"></span></div>
                    `;
                }

                qDiv.innerHTML = `
                    <div class="absolute -top-1 -left-4 text-sm">(${i+1})</div>
                    ${timeHeader}
                    ${questionBody}
                    ${answerArea}
                `;
                container.appendChild(qDiv);
            }
        }

        window.onload = generateWorksheet;
    </script>
</body>
</html>
