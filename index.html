<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何分前・何分後プリント</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
            .print-page {
                width: 210mm;
                min-height: 297mm;
                padding: 8mm 15mm 10mm 15mm; /* 上下の余白をさらに狭く */
                margin: 0;
                box-sizing: border-box;
                border: none !important;
                box-shadow: none !important;
            }
            /* 印刷時は編集枠を消す */
            .editable { 
                border-color: transparent !important; 
                background-color: transparent !important; 
                outline: none !important; 
            }
        }
        .print-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin: 20px auto;
            padding: 8mm 15mm 10mm 15mm; /* 上下の余白をさらに狭く */
            box-sizing: border-box;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
        }
        .question-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px; /* 縦の余白をきゅっと狭く(15px) */
        }
        .clock-svg {
            width: 150px; /* 時計は150pxのまま */
            height: 150px;
        }
        .q-text {
            line-height: 1.4; /* 行間を少し狭く */
            font-size: 1rem;  /* フォントサイズを小さく(1.15rem -> 1rem) */
        }
        .answer-line {
            border-bottom: 1px solid black;
            display: inline-block;
            min-width: 120px;
            margin-left: 5px;
        }
        /* カスタムラジオボタンのスタイル */
        .peer:checked + span {
            background-color: #0ea5e9; /* sky-500 */
            color: white;
            border-color: #0ea5e9;
        }
        /* クリックして編集できる要素のスタイル */
        .editable {
            padding: 2px 4px;
            border-radius: 4px;
            border: 1px solid transparent;
            transition: all 0.2s;
            cursor: text;
        }
        .editable:hover {
            border-color: #cbd5e1; /* slate-300 */
            background-color: #f8fafc; /* slate-50 */
        }
        .editable:focus {
            outline: none;
            border-color: #3b82f6; /* blue-500 */
            background-color: #eff6ff; /* blue-50 */
        }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <!-- 設定パネル -->
    <div class="no-print max-w-[210mm] mx-auto bg-white p-6 rounded-lg shadow-md mb-8">
        <h1 class="text-xl font-bold mb-4 border-b pb-2">プリント設定</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block font-bold mb-2">問題数</label>
                <div class="flex flex-wrap gap-2">
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="qCount" value="4" class="hidden peer">
                        <span class="px-4 py-2 border rounded hover:bg-gray-50 transition-colors">4問</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="qCount" value="6" class="hidden peer" checked>
                        <span class="px-4 py-2 border rounded hover:bg-gray-50 transition-colors">6問</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="qCount" value="8" class="hidden peer">
                        <span class="px-4 py-2 border rounded hover:bg-gray-50 transition-colors">8問</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="qCount" value="10" class="hidden peer">
                        <span class="px-4 py-2 border rounded hover:bg-gray-50 transition-colors">10問</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block font-bold mb-2">分のきざみ</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="step" value="1"> <span class="ml-2">1分</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="step" value="5" checked> <span class="ml-2">5分</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="step" value="10"> <span class="ml-2">10分</span></label>
                </div>
            </div>

            <div>
                <label class="block font-bold mb-2">12をまたぐ問題（時が変わる）</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="cross" value="no" checked> <span class="ml-2">なし</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="cross" value="yes"> <span class="ml-2">あり</span></label>
                </div>
            </div>

            <div>
                <label class="block font-bold mb-2">出題内容</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="direction" value="after"> <span class="ml-2">後だけ</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="direction" value="before"> <span class="ml-2">前だけ</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="direction" value="mixed" checked> <span class="ml-2">前後</span></label>
                </div>
            </div>

            <div class="bg-blue-50 p-3 rounded border border-blue-100">
                <label class="block font-bold mb-2 text-blue-800">解答形式（作成後も切替可）</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="format" value="write"> <span class="ml-2">記述式</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="format" value="choice" checked> <span class="ml-2">4択式</span></label>
                </div>
            </div>

            <div class="bg-blue-50 p-3 rounded border border-blue-100">
                <label class="block font-bold mb-2 text-blue-800">表示方法（作成後も切替可）</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="display" value="text"> <span class="ml-2">数字</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="display" value="clock" checked> <span class="ml-2">時計画像</span></label>
                </div>
            </div>
        </div>

        <div class="mt-8 flex gap-4">
            <button onclick="generateDataAndRender()" class="flex-1 bg-sky-500 text-white font-bold py-3 rounded hover:bg-sky-600 transition shadow">
                新しく問題を作る
            </button>
            <button onclick="window.print()" class="flex-1 bg-blue-700 text-white font-bold py-3 rounded hover:bg-blue-800 transition shadow">
                印刷する
            </button>
        </div>
        <p class="text-xs text-gray-500 mt-3 text-center">※ プリント部分の文字や数字は、クリックして直接書き直すことができます。</p>
    </div>

    <!-- プリント本体 -->
    <div id="print-area" class="print-page">
        <div class="flex justify-between items-end mb-4"> <!-- mb-8からmb-4にして余白を詰める -->
            <div class="text-right w-full">
                <div class="text-[1.1rem]">なまえ：____________________________________</div>
            </div>
        </div>

        <div id="questions-container" class="question-grid">
            <!-- JavaScriptで生成 -->
        </div>
    </div>

    <script>
        // 生成した問題データを保持する配列（表示切り替え用）
        let currentQuestionsData = [];

        // 時刻を文字列にするヘルパー
        const formatTime = (totalMin) => {
            let m = (totalMin % 60 + 60) % 60;
            let h = Math.floor(totalMin / 60) % 12;
            if (h <= 0) h += 12;
            return `${h}時${m === 0 ? '' : m + '分'}`;
        };

        // 時計のSVGを描画
        function createClockSVG(hour, minute) {
            const hDegree = (hour % 12) * 30 + (minute / 60) * 30;
            const mDegree = minute * 6;
            
            let marks = '';
            for (let i = 0; i < 60; i++) {
                const angle = i * 6 * Math.PI / 180;
                const isFive = i % 5 === 0;
                const r1 = isFive ? 40 : 42;
                const r2 = 45;
                const x1 = 50 + r1 * Math.sin(angle);
                const y1 = 50 - r1 * Math.cos(angle);
                const x2 = 50 + r2 * Math.sin(angle);
                const y2 = 50 - r2 * Math.cos(angle);
                marks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="black" stroke-width="${isFive ? 1.5 : 0.5}" />`;
            }

            let numbers = '';
            for (let i = 1; i <= 12; i++) {
                const angle = i * 30 * Math.PI / 180;
                const x = 50 + 33.5 * Math.sin(angle);
                const y = 50 - 33.5 * Math.cos(angle) + 3;
                numbers += `<text x="${x}" y="${y}" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="500">${i}</text>`;
            }
            
            return `
                <svg viewBox="0 0 100 100" class="clock-svg mx-auto">
                    <circle cx="50" cy="50" r="46" fill="none" stroke="black" stroke-width="1" />
                    ${marks}
                    ${numbers}
                    <line x1="50" y1="50" x2="${50 + 22 * Math.sin(hDegree * Math.PI / 180)}" y2="${50 - 22 * Math.cos(hDegree * Math.PI / 180)}" stroke="black" stroke-width="2.5" stroke-linecap="round" />
                    <line x1="50" y1="50" x2="${50 + 38 * Math.sin(mDegree * Math.PI / 180)}" y2="${50 - 38 * Math.cos(mDegree * Math.PI / 180)}" stroke="black" stroke-width="1.5" stroke-linecap="round" />
                    <circle cx="50" cy="50" r="2" fill="black" />
                </svg>
            `;
        }

        // 4択式の選択肢（正解＋ダミー3つ）を生成
        function generateChoices(origH, origM, diff, isAfter) {
            const correctTotal = origH * 60 + origM + (isAfter ? diff : -diff);
            const correctStr = formatTime(correctTotal);
            const choicesSet = new Set([correctStr]);

            // ダミー1: 前後逆の計算
            const wrong1Total = origH * 60 + origM + (isAfter ? -diff : diff);
            choicesSet.add(formatTime(wrong1Total));

            // ダミー2: 時の読み間違い（主に1時間進めて読んでしまうミス）
            const wrong2Total = (origH + 1) * 60 + origM + (isAfter ? diff : -diff);
            choicesSet.add(formatTime(wrong2Total));

            // ダミー3: 長短針の読み間違い的要素（長針の指す数字を「時」として読んでしまう）
            let swappedH = Math.floor(origM / 5);
            if (swappedH === 0) swappedH = 12;
            let swappedM = origH * 5;
            let swappedTotal = swappedH * 60 + swappedM + (isAfter ? diff : -diff);
            choicesSet.add(formatTime(swappedTotal));

            // もし重複して4つに満たない場合は、分計算ミスを追加
            const wrongOffsets = [10, -10, 5, -5, 20];
            for (let offset of wrongOffsets) {
                if (choicesSet.size >= 4) break;
                choicesSet.add(formatTime(correctTotal + offset));
            }

            // 配列にしてシャッフル
            const choicesArr = Array.from(choicesSet).slice(0, 4);
            return choicesArr.sort(() => Math.random() - 0.5);
        }

        // 問題データを作成して配列に保持する
        function generateDataAndRender() {
            const qCountEl = document.querySelector('input[name="qCount"]:checked');
            const stepEl = document.querySelector('input[name="step"]:checked');
            const crossEl = document.querySelector('input[name="cross"]:checked');
            const directionEl = document.querySelector('input[name="direction"]:checked');

            if (!qCountEl || !stepEl || !crossEl || !directionEl) return;

            const qCount = parseInt(qCountEl.value);
            const step = parseInt(stepEl.value);
            const crossAllowed = crossEl.value === 'yes';
            const direction = directionEl.value;

            currentQuestionsData = []; // 初期化

            for (let i = 0; i < qCount; i++) {
                let hour, minute, diff, isAfter;
                let valid = false;
                let loopCount = 0;

                while (!valid && loopCount < 1000) {
                    loopCount++;
                    hour = Math.floor(Math.random() * 12) + 1;
                    minute = Math.floor(Math.random() * (60 / step)) * step;
                    
                    if(step === 1) {
                        diff = Math.floor(Math.random() * 25) + 2; 
                    } else {
                        diff = (Math.floor(Math.random() * 4) + 1) * step;
                    }

                    if (direction === 'mixed') {
                        isAfter = Math.random() > 0.5;
                    } else {
                        isAfter = (direction === 'after');
                    }

                    const totalMinutes = hour * 60 + minute;
                    const newTotalMinutes = isAfter ? totalMinutes + diff : totalMinutes - diff;
                    const startHour = Math.floor(totalMinutes / 60);
                    const endHour = Math.floor(newTotalMinutes / 60);
                    const crosses = (startHour !== endHour);

                    if (!crossAllowed) {
                        if (!crosses && newTotalMinutes >= 60 && newTotalMinutes < 13 * 60) valid = true;
                    } else {
                        if (newTotalMinutes >= 60 && newTotalMinutes < 13 * 60) valid = true;
                    }
                }

                // 選択肢の生成
                const choices = generateChoices(hour, minute, diff, isAfter);

                currentQuestionsData.push({
                    id: i + 1,
                    hour, minute, diff, isAfter, choices
                });
            }

            // 描画処理へ
            renderWorksheet();
        }

        // 保持している問題データと表示設定をもとにHTMLを描画する
        function renderWorksheet() {
            const container = document.getElementById('questions-container');
            if (!container || currentQuestionsData.length === 0) return;
            container.innerHTML = '';

            const format = document.querySelector('input[name="format"]:checked').value;
            const display = document.querySelector('input[name="display"]:checked').value;

            currentQuestionsData.forEach(q => {
                const qDiv = document.createElement('div');
                qDiv.className = 'p-1 flex flex-col items-start relative'; // p-2からp-1にして内側の余白を減らす
                
                // 時間表示部（テキストか時計か）
                let timeHeader = '';
                const timeText = `${q.hour}時${q.minute === 0 ? '' : q.minute + '分'}`;
                if (display === 'text') {
                    timeHeader = `<div class="q-text"><span class="editable" contenteditable="true">${timeText}</span>の</div>`;
                } else {
                    timeHeader = `<div class="w-full mb-1">${createClockSVG(q.hour, q.minute)}</div>`; // 下の余白を減らす
                }

                // 問題文
                const questionText = `${q.diff}分${q.isAfter ? '後' : '前'}は`;
                const questionBody = `<div class="q-text"><span class="editable" contenteditable="true">${questionText}</span></div>`;

                // 解答エリア（記述式か4択式か）
                let answerArea = '';
                if (format === 'write') {
                    answerArea = `
                        <div class="mt-2 text-base w-full">
                            <span class="editable" contenteditable="true">答え：</span><span class="answer-line"></span>
                        </div>`;
                } else {
                    // 4択式
                    const labels = ['ア', 'イ', 'ウ', 'エ'];
                    let choicesHTML = '';
                    q.choices.forEach((choice, index) => {
                        choicesHTML += `<span class="editable whitespace-nowrap" contenteditable="true">${labels[index]}：${choice}</span>`;
                    });
                    
                    answerArea = `
                        <div class="mt-2 grid grid-cols-2 gap-y-1 gap-x-2 text-[1rem] w-full font-medium"> <!-- mtを減らし、gap-yを詰めてフォントも小さく -->
                            ${choicesHTML}
                        </div>`;
                }

                qDiv.innerHTML = `
                    <div class="absolute -top-1 -left-4 text-sm font-bold editable" contenteditable="true">(${q.id})</div>
                    ${timeHeader}
                    ${questionBody}
                    ${answerArea}
                `;
                container.appendChild(qDiv);
            });
        }

        // ラジオボタンの「解答形式」と「表示方法」が変更されたら再描画するイベントを登録
        document.querySelectorAll('input[name="format"], input[name="display"]').forEach(el => {
            el.addEventListener('change', () => {
                if (currentQuestionsData.length > 0) {
                    renderWorksheet();
                }
            });
        });

        // 初期表示
        window.onload = generateDataAndRender;
    </script>
</body>
</html>
